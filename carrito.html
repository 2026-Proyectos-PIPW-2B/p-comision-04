<body class="d-flex flex-column min-vh-100">

<div class="container my-4">

    <h1 class="mb-4">
        <i class="bi bi-arrow-left"></i> Mi carrito
    </h1>

    <hr class="border-success border-2 opacity-100">

    <div class="row justify-content-center g-4">

        <div class="col-12 col-lg-8">
            <div class="card h-100">
                <div class="card-body">
                    <h2 class="card-title">Productos</h2>

                    <div class="text-center py-5">
                        $0
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-lg-4">
            <div class="card h-100">
                <div class="card-body">

                    <h2 class="card-title">RESUMEN</h2>

                    <p>Aún no se encuentran productos</p>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <span class="fs-4">Total</span>
                        <span class="fs-1 fw-bold">$0</span>
                    </div>

                    <div class="d-grid gap-2">

                    </div>

</div>

<div class="modal fade" id="loginModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-light border-success">

            <div class="modal-header border-success">
                <h5 class="modal-title text-success">
                    Iniciar Sesión
                </h5>

                <button type="button"
                        class="btn-close btn-close-white"
                        data-bs-dismiss="modal">
                </button>
            </div>

            <div class="modal-body">

                <form>

                    <div class="mb-3">
                        <label for="usuario" class="form-label">
                            Usuario
                        </label>
                        <input type="text"
                               class="form-control bg-dark text-light border-secondary"
                               id="usuario">
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">
                            Contraseña
                        </label>
                        <input type="password"
                               class="form-control bg-dark text-light border-secondary"
                               id="password">
                    </div>

                    <button type="submit" class="btn btn-success w-100">
                        Ingresar
                    </button>

                </form>

            </div>

        </div>
    </div>
</div>
